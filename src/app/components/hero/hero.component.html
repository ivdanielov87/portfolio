<section id="hero" class="hero">
  <div class="hero__content">
    <p class="hero__greeting">Hello, I'm</p>
    <h1 class="hero__title">
      John <span class="accent">Doe</span>
    </h1>
    <h2 class="hero__subtitle">Full-Stack Developer</h2>
    <p class="hero__description">
      I'm a passionate developer based in Bulgaria, specializing in building
      exceptional web applications. With a strong focus on Angular and modern
      technologies, I create accessible, performant, and user-centered digital
      experiences.
    </p>
    <div class="hero__actions">
      <a href="#projects" class="hero__cta" (click)="scrollTo($event, 'projects')">
        View My Work
      </a>
      <a href="#contact" class="hero__cta hero__cta--outline" (click)="scrollTo($event, 'contact')">
        Contact Me
      </a>
    </div>
  </div>
</section>
