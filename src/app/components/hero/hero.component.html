<section id="hero" class="hero">
  <div class="hero__inner">
    <div class="hero__content">
      <p class="hero__greeting" appReveal="up" [revealDelay]="greetingRevealDelay" [revealDuration]="1750" [revealWaitForReady]="false">HELLO, I'M</p>
      <h1 class="hero__title" appReveal="zoom" [revealDelay]="primaryRevealDelay" [revealDuration]="950">Ivelin Dimitrov</h1>
      <p class="hero__subtitle" appReveal="zoom" [revealDelay]="primaryRevealDelay" [revealDuration]="950"><span class="hero__dash"></span> Front-end Developer</p>
      <p class="hero__description" appReveal="right" [revealDelay]="descriptionRevealDelay" [revealDuration]="0">
        I build modern, responsive and accessible web applications using Angular, React,
        TypeScript and the latest front-end technologies. Passionate about clean
        code and great user experiences.
      </p>
      <a href="#contact" class="hero__cta" (click)="scrollTo($event, 'contact')" appReveal="right" [revealDelay]="ctaRevealDelay" [revealDuration]="1600">Contact Me</a>
    </div>
    <div class="hero__image" appReveal="zoom" [revealDelay]="imageRevealDelay" [revealDuration]="1250">
      <div class="hero__image-wrapper">
        <img src="profile3.jpg" alt="Ivelin Dimitrov" />
      </div>
    </div>
  </div>
</section>
