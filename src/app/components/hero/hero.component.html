<section id="hero" class="hero">
  <div class="hero__inner">
    <div class="hero__content">
      <p class="hero__greeting" appReveal="up" [revealDelay]="250" [revealDuration]="850">HELLO, I'M</p>
      <h1 class="hero__title" appReveal="zoom" [revealDelay]="1000" [revealDuration]="950">Ivelin Dimitrov</h1>
      <p class="hero__subtitle" appReveal="left" [revealDelay]="1750" [revealDuration]="950"><span class="hero__dash"></span> Front-end Developer</p>
      <p class="hero__description" appReveal="right" [revealDelay]="2500" [revealDuration]="1000">
        I build modern, responsive, and accessible web applications using Angular, React,
        TypeScript, and the latest front-end technologies. Passionate about clean
        code and great user experiences.
      </p>
      <a href="#contact" class="hero__cta" (click)="scrollTo($event, 'contact')" appReveal="zoom" [revealDelay]="3250" [revealDuration]="1400" [revealEasing]="'ease-in-out'">Contact Me</a>
    </div>
    <div class="hero__image" appReveal="zoom" [revealDelay]="1000" [revealDuration]="1250">
      <div class="hero__image-wrapper">
        <img src="profile3.jpg" alt="Ivelin Dimitrov" />
      </div>
    </div>
  </div>
</section>
