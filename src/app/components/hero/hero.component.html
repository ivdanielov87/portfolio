<section id="hero" class="hero">
  <div class="hero__content">
    <p class="hero__greeting">Hello, I'm</p>
    <h1 class="hero__title">
      Ivelin <span class="accent">Dimitrov</span>
    </h1>
    <h2 class="hero__subtitle">Front-end Developer</h2>
    <p class="hero__description">
      I build modern, responsive, and accessible web applications using React,
      TypeScript, and the latest front-end technologies. Passionate about clean
      code and great user experiences.
    </p>
    <div class="hero__actions">
      <a href="#portfolio" class="hero__cta" (click)="scrollTo($event, 'portfolio')">
        View My Work
      </a>
      <a href="#contact" class="hero__cta hero__cta--outline" (click)="scrollTo($event, 'contact')">
        Contact Me
      </a>
    </div>
  </div>
</section>
