<section id="hero" class="hero">
  <div class="container hero__content">
    <div class="hero__text">
      <p class="hero__greeting">Hi, my name is</p>
      <h1 class="hero__title">John Doe</h1>
      <h2 class="hero__subtitle">I build things for the web.</h2>
      <p class="hero__description">
        I'm a full-stack developer specializing in building exceptional digital
        experiences. Currently focused on creating accessible, human-centered
        products.
      </p>
      <a
        href="#projects"
        class="hero__cta"
        (click)="scrollTo($event, 'projects')"
      >
        View My Work
      </a>
    </div>
  </div>
</section>
