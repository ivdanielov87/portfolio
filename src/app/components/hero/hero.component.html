<section id="hero" class="hero">
  <div class="hero__inner">
    <div class="hero__content">
      <p class="hero__greeting">HELLO, I'M</p>
      <h1 class="hero__title">Ivelin Dimitrov</h1>
      <p class="hero__subtitle"><span class="hero__dash"></span> Front-end Developer</p>
      <p class="hero__description">
        I build modern, responsive, and accessible web applications using React,
        TypeScript, and the latest front-end technologies. Passionate about clean
        code and great user experiences.
      </p>
      <a href="#contact" class="hero__cta" (click)="scrollTo($event, 'contact')">Hire Me</a>
    </div>
    <div class="hero__image">
      <div class="hero__image-wrapper">
        <img src="profile.jpg" alt="Ivelin Dimitrov" />
      </div>
    </div>
  </div>
</section>
