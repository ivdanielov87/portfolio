<section id="contact" class="contact" appReveal="up">
  <div class="section-header" appReveal="up">
    <h2 class="section-title">Contact Me</h2>
  </div>

  <div class="contact__wrapper" appReveal="up" [revealDelay]="100">
    @if (submitted) {
      <div class="contact__success" appReveal="up">
        <span class="success-icon">✓</span>
        <p>Thank you! Your message has been sent successfully.</p>
      </div>
    }

    <form class="contact__form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="Your name" [class.error]="errors.name" (input)="clearSuccess()" />
          @if (errors.name) { <span class="form-error">{{ errors.name }}</span> }
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="your.email&#64;example.com" [class.error]="errors.email" (input)="clearSuccess()" />
          @if (errors.email) { <span class="form-error">{{ errors.email }}</span> }
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" [(ngModel)]="message" name="message" rows="5" placeholder="Tell me about your project..." [class.error]="errors.message" (input)="clearSuccess()"></textarea>
        @if (errors.message) { <span class="form-error">{{ errors.message }}</span> }
      </div>

      @if (sendError) {
        <div class="contact__error">{{ sendError }}</div>
      }

      <button type="submit" class="contact__submit" [disabled]="sending">
        {{ sending ? 'Sending...' : 'Send Message' }}
      </button>
    </form>
  </div>
</section>
