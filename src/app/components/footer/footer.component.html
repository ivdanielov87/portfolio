<footer class="footer">
  <div class="footer__inner">
    <nav class="footer__nav">
      @for (link of navLinks; track link.target) {
        <a [href]="'#' + link.target" (click)="scrollTo($event, link.target)">{{ link.label }}</a>
      }
    </nav>
    <p class="footer__copyright">
      &copy; {{ currentYear }} Ivelin Dimitrov. All rights reserved.
    </p>
  </div>
</footer>
