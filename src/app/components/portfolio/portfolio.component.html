<section id="portfolio" class="portfolio" appReveal="up">
  <div class="section-header" appReveal="up">
    <h2 class="section-title">Portfolio</h2>
  </div>

  <div class="portfolio__grid">
    @for (project of projects; track project.title; let i = $index) {
      <div
        class="portfolio-card"
        [appReveal]="i % 2 === 0 ? 'up' : 'zoom'"
        [revealDelay]="100 + i * 70"
      >
        <div class="portfolio-card__image">
          <span class="portfolio-card__preview-text">{{ project.title }}</span>
        </div>
        <div class="portfolio-card__content">
          <span class="portfolio-card__category">{{ project.category }}</span>
          <h3 class="portfolio-card__title">{{ project.title }}</h3>
        </div>
      </div>
    }
  </div>
</section>
