<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#020617" />

  <script>
    (() => {
      const root = document.documentElement;
      let savedTheme = 'dark';

      const palettes = {
        light: {
          '--bg-page': '#e5e7eb',
          '--bg-primary': '#ffffff',
          '--bg-secondary': '#f8f9fa',
          '--bg-sidebar': '#111827',
          '--bg-card': '#ffffff',
          '--bg-card-hover': '#f3f4f6',
          '--bg-input': '#ffffff',
          '--text-primary': '#111827',
          '--text-secondary': '#4b5563',
          '--text-muted': '#9ca3af',
          '--accent-primary': '#eab308',
          '--accent-hover': '#ca8a04',
          '--accent-light': 'rgba(234, 179, 8, 0.1)',
          '--border-color': '#e5e7eb',
          '--border-light': '#d1d5db',
          '--tag-bg': '#f3f4f6',
          '--tag-text': '#374151',
          '--sidebar-text': '#e5e7eb',
          '--sidebar-muted': '#9ca3af',
          '--sidebar-border': '#1f2937',
          '--sidebar-accent': '#eab308',
          '--right-bar-bg': '#111827',
          '--right-bar-icon': '#9ca3af',
          '--right-bar-icon-hover': '#eab308',
        },
        dark: {
          '--bg-page': '#020617',
          '--bg-primary': '#0f172a',
          '--bg-secondary': '#1e293b',
          '--bg-sidebar': '#0f172a',
          '--bg-card': '#1e293b',
          '--bg-card-hover': '#334155',
          '--bg-input': '#1e293b',
          '--text-primary': '#f1f5f9',
          '--text-secondary': '#94a3b8',
          '--text-muted': '#64748b',
          '--accent-primary': '#eab308',
          '--accent-hover': '#ca8a04',
          '--accent-light': 'rgba(234, 179, 8, 0.15)',
          '--border-color': '#334155',
          '--border-light': '#475569',
          '--tag-bg': '#334155',
          '--tag-text': '#e2e8f0',
          '--sidebar-text': '#e2e8f0',
          '--sidebar-muted': '#94a3b8',
          '--sidebar-border': '#1e293b',
          '--sidebar-accent': '#eab308',
          '--right-bar-bg': '#1e293b',
          '--right-bar-icon': '#94a3b8',
          '--right-bar-icon-hover': '#eab308',
        },
      };

      try {
        savedTheme = localStorage.getItem('theme') ?? 'dark';
      } catch {
        savedTheme = 'dark';
      }

      const useDarkTheme = savedTheme !== 'light';
      const themeName = useDarkTheme ? 'dark' : 'light';
      const backgroundColor = useDarkTheme ? '#020617' : '#e5e7eb';
      const colorScheme = useDarkTheme ? 'dark' : 'light';
      const palette = palettes[themeName];

      root.classList.toggle('dark-theme', useDarkTheme);
      Object.entries(palette).forEach(([name, value]) => {
        root.style.setProperty(name, value);
      });
      root.style.setProperty('--startup-bg', backgroundColor);
      root.style.backgroundColor = backgroundColor;
      root.style.colorScheme = colorScheme;

      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      themeColorMeta?.setAttribute('content', backgroundColor);
    })();
  </script>

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background-color: var(--startup-bg, #020617);
    }

    body,
    app-root {
      display: block;
      min-height: 100vh;
      background-color: inherit;
    }
  </style>

  <meta property="og:title" content="Ivelin Dimitrov" />
  <meta property="og:description" content="Frontend Developer Portfolio" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.ivdimitrov.com/" />
  <meta property="og:image" content="https://www.ivdimitrov.com/profile2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="600" />
  <meta property="og:image:type" content="image/jpeg" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23eab308'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
</head>
<body>
  <app-root></app-root>
</body>
</html>
