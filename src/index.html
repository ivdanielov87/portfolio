<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#020617" />

  <script>
    (() => {
      const root = document.documentElement;
      let savedTheme = 'dark';

      try {
        savedTheme = localStorage.getItem('theme') ?? 'dark';
      } catch {
        savedTheme = 'dark';
      }

      const useDarkTheme = savedTheme !== 'light';
      const backgroundColor = useDarkTheme ? '#020617' : '#e5e7eb';

      root.classList.toggle('dark-theme', useDarkTheme);
      root.style.backgroundColor = backgroundColor;
      root.style.colorScheme = useDarkTheme ? 'dark' : 'light';

      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      themeColorMeta?.setAttribute('content', backgroundColor);
    })();
  </script>

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background-color: #020617;
    }

    body,
    app-root {
      display: block;
      min-height: 100vh;
      background-color: inherit;
    }
  </style>

  <meta property="og:title" content="Ivelin Dimitrov" />
  <meta property="og:description" content="Frontend Developer Portfolio" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.ivdimitrov.com/" />
  <meta property="og:image" content="https://www.ivdimitrov.com/profile2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="600" />
  <meta property="og:image:type" content="image/jpeg" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23eab308'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
</head>
<body>
  <app-root></app-root>
</body>
</html>
